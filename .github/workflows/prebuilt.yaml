name: prebuilt

on:
  push:
    branches: [prebuilt]
  workflow_dispatch:

jobs:
  # Linux / windows-gnu は Docker 経由 (cross toolchain が Linux 側で成熟している)
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-24.04-arm
          - target: x86_64-pc-windows-gnu
            runs-on: ubuntu-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: docker build
        run: |
          docker build \
            -f docker/Dockerfile_${{ matrix.target }} \
            -t cadrum-prebuild:${{ matrix.target }} \
            .

      - name: docker run (extract tarball)
        run: |
          mkdir -p out
          docker run --rm -v "$PWD/out:/out" cadrum-prebuild:${{ matrix.target }}
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: cadrum-occt-${{ matrix.target }}
          path: out/cadrum-occt-*.tar.gz

  # windows-msvc は native Windows runner + native cl.exe で作る。
  # cargo-xwin/clang-cl 経由の prebuild は MSVC STL template の COMDAT 排出判断が
  # native cl.exe と食い違い、ユーザ側リンク時に `std::_Variant_storage_<...>`
  # 未解決シンボルを量産する (issue #73)。native ビルドは ABI 境界を踏まない。
  build-windows-msvc:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: ilammy/msvc-dev-cmd@v1

      - name: install make
        run: choco install make -y

      - name: build
        shell: bash
        env:
          CARGO_BUILD_TARGET: x86_64-pc-windows-msvc
        run: make -C docker cadrum-occt-x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: cadrum-occt-x86_64-pc-windows-msvc
          path: cadrum-occt-*.tar.gz

  release:
    needs: [build, build-windows-msvc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: occt-v800rc5
          name: OCCT prebuilt v800rc5
          files: dist/*.tar.gz
